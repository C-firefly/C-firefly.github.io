<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Projects</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:monospace;
    color:#00c3ff;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    
    /* Background Image */
    background:url('images/background.jpg') no-repeat center center fixed;
    background-size:cover;
    position:relative;
}

/* Dark Overlay */
body::before{
    content:"";
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.78);
    z-index:-1;
}

/* Main Container */
.container{
    width:100%;
    max-width:1200px;
    margin:auto;
    padding:20px;
    flex:1;
}

/* Title */
h2{
    text-align:center;
    font-size:32px;
    margin:25px 0 35px;
    letter-spacing:2px;
}

/* Projects Grid */
.projects{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:25px;
}

/* Project Card */
.box{
    border:1px solid #00c3ff;
    border-radius:14px;
    padding:25px 20px;
    background:rgba(0,0,0,0.55);
    box-shadow:0 0 12px rgba(0,195,255,0.2);
    transition:0.3s;
}

.box:hover{
    transform:translateY(-5px);
    box-shadow:0 0 20px rgba(0,195,255,0.4);
}

/* Project Title */
.box h3{
    font-size:24px;
    margin-bottom:12px;
}

/* Description */
.box p{
    font-size:15px;
    line-height:1.6;
    color:#bfefff;
}

/* Button */
.btn{
    display:inline-block;
    margin-top:18px;
    padding:10px 18px;
    border:1px solid #00c3ff;
    border-radius:8px;
    color:#00c3ff;
    text-decoration:none;
    transition:0.3s;
}

.btn:hover{
    background:#00c3ff;
    color:black;
}

/* Back Button */
.back{
    display:inline-block;
    margin-top:35px;
    text-decoration:none;
    color:#00c3ff;
    border:1px solid #00c3ff;
    padding:10px 18px;
    border-radius:8px;
    transition:0.3s;
}

.back:hover{
    background:#00c3ff;
    color:black;
}

/* Footer */
footer{
    width:100%;
    text-align:center;
    padding:18px;
    border-top:1px solid #00c3ff;
    background:rgba(0,0,0,0.75);
    color:#8edfff;
    font-size:14px;
    margin-top:40px;
}

/* Mobile Responsive */
@media (max-width:600px){

    h2{
        font-size:26px;
    }

    .box{
        padding:20px 16px;
    }

    .box h3{
        font-size:21px;
    }

    .box p{
        font-size:14px;
    }

    .btn,
    .back{
        width:100%;
        text-align:center;
    }

}

</style>
</head>

<body>

<div class="container">

    <h2>My Projects</h2>

    <div class="projects">

        <div class="box">
            <h3>🤖 Telegram Bot</h3>
            <p>
                AI powered Telegram automation bot with smart replies 
                and advanced features.
            </p>

            <a href="telegrambot.html" class="btn">
                View Project
            </a>
        </div>

        <div class="box">
            <h3>⚙️ Automation Tool</h3>
            <p>
                Script based automation tools for productivity, 
                security and workflow management.
            </p>

            <a href="automation.html" class="btn">
                View Project
            </a>
        </div>

    </div>

    <a href="index.html" class="back">
        ← Back
    </a>

</div>

<footer>
    C-Firefly ©2026
</footer>

</body>
</html>
